<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create report | Cavera</title>
  <link rel="stylesheet" href="css/wireframe.css" />
</head>
<body>
  <nav class="wf-prototype">
    <a href="01-home.html">← Back</a>
    <strong>02 · Create report</strong>
    <a href="03-room-list.html">Next →</a>
  </nav>

  <section class="app">
    <header class="app-header">
      <span class="ph ph--logo app-header__logo" aria-hidden="true"></span>
      <nav class="stepper-bar" aria-label="Progress">
        <span class="active">Setup</span>
        <span>Rooms</span>
        <span>Capture</span>
        <span>Export</span>
      </nav>
      <span class="app-header__spacer"></span>
      <span class="app-header__pill">No account</span>
      <span class="ph ph--avatar" aria-hidden="true"></span>
    </header>

    <section class="app-layout">
      <aside class="app-sidebar">
        <p class="sidebar-report">
          <strong>New report</strong>
          <span>Step 1 of 4</span>
        </p>
        <ul class="sidebar-steps">
          <li><a href="#" class="active"><span class="step-dot"></span> Report details</a></li>
          <li><a href="03-room-list.html"><span class="step-dot"></span> Rooms</a></li>
          <li><a href="04-capture-room.html"><span class="step-dot"></span> Capture</a></li>
          <li><a href="06-export.html"><span class="step-dot"></span> Export</a></li>
        </ul>
      </aside>

      <main class="app-main app-main--center app-main--narrow">
        <section class="page-inner">
          <header class="page-top">
            <div>
              <h1>Start your report</h1>
              <p>We'll walk room by room. Nothing leaves your browser until you export.</p>
            </div>
          </header>

          <section class="card card--form">
            <p class="field">
              <label>Report type</label>
              <span class="segment">
                <button type="button" class="active">Move-in</button>
                <button type="button">Move-out</button>
              </span>
            </p>
            <p class="field">
              <label for="state">State</label>
              <input class="input" id="state" type="text" value="California" readonly />
            </p>
            <p class="field">
              <label for="address">Street address</label>
              <input class="input" id="address" type="text" value="123 Oak Street" readonly />
            </p>
            <p class="field">
              <label for="unit">Unit <span class="badge-tag">optional</span></label>
              <input class="input" id="unit" type="text" value="Apt 4B" readonly />
            </p>
            <p class="field">
              <label for="fwd">Forwarding address <span class="badge-tag">optional</span></label>
              <input class="input" id="fwd" type="text" placeholder="Where to return your deposit" readonly />
              <span class="hint">Recommended after move-out</span>
            </p>
            <p><a class="btn btn--primary btn--block btn--lg" href="03-room-list.html">Create report</a></p>
          </section>
        </section>
      </main>
    </section>
  </section>
</body>
</html>
