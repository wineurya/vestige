<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>02 Create report | Cavera</title>
  <link rel="stylesheet" href="css/wireframe.css" />
</head>
<body>
  <nav class="wf-prototype">
    <a href="01-home.html">Back</a>
    <strong>02 / 06</strong> Create report
    <a href="03-room-list.html">Next</a>
  </nav>

  <section class="app">
    <header class="app-topbar">
      <a href="01-home.html" class="site-logo">CAVERA</a>
      <p class="app-stepper">
        <span class="active">Setup</span>
        <span>Rooms</span>
        <span>Capture</span>
        <span>Export</span>
      </p>
      <p class="app-topbar-actions">No account · Local only</p>
    </header>

    <section class="app-body">
      <main class="app-main narrow">
        <header class="page-head">
          <h1>New report</h1>
          <p>No account required. Photos stay in your browser until you export.</p>
        </header>

        <section class="wf-card form-card">
          <p class="wf-label">Report type</p>
          <p class="wf-segment">
            <button type="button" class="active">Move-in</button>
            <button type="button">Move-out</button>
          </p>

          <p class="wf-field">
            <label for="state">State</label>
            <input class="wf-input" id="state" type="text" value="California" readonly />
          </p>
          <p class="wf-field">
            <label for="address">Street address</label>
            <input class="wf-input" id="address" type="text" value="123 Oak St" readonly />
          </p>
          <p class="wf-field">
            <label for="unit">Unit <span class="badge">optional</span></label>
            <input class="wf-input" id="unit" type="text" value="4B" readonly />
          </p>
          <p class="wf-field">
            <label for="forward">Forwarding address <span class="badge">optional</span></label>
            <input class="wf-input" id="forward" type="text" placeholder="For deposit return" readonly />
          </p>

          <p><a class="wf-btn accent block" href="03-room-list.html">Create report</a></p>
        </section>
      </main>
    </section>
  </section>
</body>
</html>
