<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>04 Capture | Cavera</title>
  <link rel="stylesheet" href="css/wireframe.css" />
</head>
<body>
  <nav class="wf-prototype">
    <a href="03-room-list.html">Back</a>
    <strong>04 / 06</strong> Capture room
    <a href="03-room-list.html">Done</a>
  </nav>

  <section class="app">
    <header class="app-topbar">
      <a href="01-home.html" class="site-logo">CAVERA</a>
      <p class="app-stepper">
        <span class="done">Setup</span>
        <span class="done">Rooms</span>
        <span class="active">Capture</span>
        <span>Export</span>
      </p>
      <p class="app-topbar-actions"><a href="03-room-list.html">All rooms</a></p>
    </header>

    <section class="app-body">
      <aside class="app-sidebar">
        <p class="report-meta"><strong>Kitchen</strong>Room 1 of 7</p>
        <ul class="app-nav">
          <li><a href="#" class="active">Kitchen</a></li>
          <li><a href="#">Bathroom</a></li>
          <li><a href="#">Bedroom</a></li>
          <li><a href="#">Living room</a></li>
        </ul>
      </aside>

      <main class="app-main">
        <header class="toolbar-row page-head">
          <h1>Kitchen</h1>
          <p>
            <a class="wf-btn accent" href="#">Upload photos</a>
            <a class="wf-btn secondary" href="#">Mark issue</a>
            <a class="wf-btn ghost" href="03-room-list.html">Room OK</a>
          </p>
        </header>

        <section class="wf-split">
          <section>
            <p class="wf-label">What to capture</p>
            <p class="wf-chips">
              <span class="wf-chip active">Walls</span>
              <span class="wf-chip">Floors</span>
              <span class="wf-chip">Ceiling</span>
              <span class="wf-chip">Windows</span>
              <span class="wf-chip">Appliances</span>
              <span class="wf-chip">Cabinets</span>
            </p>
            <p class="wf-field">
              <label for="note">Issue note</label>
              <textarea class="wf-input" id="note" rows="3" readonly>Pre-existing scratch on counter near sink</textarea>
            </p>
          </section>

          <section>
            <p class="upload-zone">Drop photos here or click Upload</p>
            <section class="wf-grid-photos" aria-label="Photos">
              <figure class="wf-img sm">Wide 9:12</figure>
              <figure class="wf-img sm">+ add</figure>
              <figure class="wf-img sm">+ add</figure>
              <figure class="wf-img sm">Close-up</figure>
              <figure class="wf-img sm">+ add</figure>
              <figure class="wf-img sm">+ add</figure>
            </section>
          </section>
        </section>
      </main>
    </section>
  </section>
</body>
</html>
